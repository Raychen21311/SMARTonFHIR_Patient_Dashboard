<script type="text/javascript">
FHIR.oauth2.ready().then(function(client) {
    
    // 1. 取得伺服器選定的病患 ID
    const pid = client.patient.id;
    
    if (pid) {
        // 2. 將 ID 存入 sessionStorage，確保 overview.html 讀得到
        sessionStorage.setItem("selected_patient_id", pid);

        // 3. 渲染一下資料（選用，方便您肉眼確認）
        client.patient.read().then(function(pt) {
            document.getElementById("patient").innerText = JSON.stringify(pt, null, 4);
            
            // 4. 🔥 重點：延遲 0.5 秒後自動跳轉到儀表板
            console.log("已取得病患 Context，準備跳轉...");
            setTimeout(() => {
                window.location.href = "overview.html";
            }, 500); 
        });
    } else {
        document.getElementById("patient").innerText = "錯誤：伺服器未回傳病患 Context。";
    }

    // 您原本的 MedicationRequest 邏輯可以保留或移除，
    // 因為現在目標是快速跳轉到 overview.html
    /* ... 原有的 MedicationRequest 代碼 ... */

}).catch(function(error) {
    document.getElementById("patient").innerText = error.stack;
});
</script>
