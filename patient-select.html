<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>正在導向儀表板...</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f6f7fb;
            color: #1f2937;
        }
        .loader-container { text-align: center; }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3b82f6;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #ef4444; display: none; }
    </style>
</head>
<body>

<div class="loader-container">
    <div id="loader" class="spinner"></div>
    <div id="status">正在取得病患資料...</div>
    <div id="error" class="error-msg">
        <h3>無法自動選取病患</h3>
        <p>請確認您的 Launch Scope 包含 <code>launch/patient</code> 或 <code>patient/*.read</code>。</p>
    </div>
</div>

<script>
    // 當 OAuth 認證準備完成
    FHIR.oauth2.ready().then((client) => {
        // 從 SMART Client Context 取得病患 ID
        const patientId = client.patient.id;

        if (patientId) {
            // 1. 將病患 ID 存入 sessionStorage (維持你原本 overview.html 的讀取邏輯)
            sessionStorage.setItem("selected_patient_id", patientId);

            // 2. 立即跳轉至儀表板
            console.log("偵測到測試 Server 病患 ID:", patientId);
            window.location.href = "overview.html";
        } else {
            // 如果 Client 沒帶病患 ID，顯示錯誤
            showError("未偵測到選定的病患。請確保您是從測試 Server 的 Launch 流程進入。");
        }
    }).catch(err => {
        console.error("SMART Ready Error:", err);
        showError("連線至 FHIR 伺服器失敗，請重新嘗試登入。");
    });

    function showError(msg) {
        document.getElementById("loader").style.display = "none";
        document.getElementById("status").style.display = "none";
        const errDiv = document.getElementById("error");
        errDiv.style.display = "block";
        errDiv.querySelector('p').innerText = msg;
    }
</script>

</body>
</html>
