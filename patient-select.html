<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>醫生診間系統 - Context 同步中</title>
    <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
        .loader-box { text-align: center; background: white; padding: 40px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="loader-box">
        <h2 id="msg">正在同步醫生診間權限...</h2>
        <p id="sub-msg">正在載入選定病患資料，請稍候。</p>
        <pre id="debug-log" style="display:none; text-align:left; font-size:12px;"></pre>
    </div>

    <script>
        FHIR.oauth2.ready().then(function(client) {
            // 1. 取得當前 Context 中的病患 ID
            // 在醫生從伺服器點選病人後，這個 ID 會自動出現在 client 物件中
            const pid = client.patient.id;

            if (pid) {
                // 2. 存入 Session 給後續 overview.html 使用
                sessionStorage.setItem("selected_patient_id", pid);
                
                // 3. (選用) 顯示醫生目前正在檢視哪位病人
                client.patient.read().then(function(pt) {
                    const name = pt.name ? pt.name[0].text : "未命名病患";
                    document.getElementById("msg").innerText = "已連結至病患：" + name;
                    document.getElementById("sub-msg").innerText = "即將跳轉至健康儀表板...";
                    
                    // 4. 自動跳轉
                    setTimeout(() => {
                        window.location.href = "overview.html";
                    }, 800);
                });
            } else {
                // 如果沒有 PID，可能是 Server 沒有正確啟動 Patient Context
                document.getElementById("msg").innerText = "未偵測到選定病患";
                document.getElementById("sub-msg").innerText = "請確保從診間系統選擇病患後啟動，或檢查 Scope 設定。";
            }
        }).catch(function(err) {
            document.getElementById("msg").innerText = "連線失敗";
            document.getElementById("debug-log").style.display = "block";
            document.getElementById("debug-log").innerText = err.stack;
        });
    </script>
</body>
</html>
